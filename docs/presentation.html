<style>

  .muted{color:var(--muted);}

  .pill{display:inline-block;font-size:12.5px;font-weight:700;padding:3px 10px;border-radius:999px;

  .pill.state{background:rgba(255,206,107,.14);color:#ffe0a3;border-color:#7d6630;}
  table{width:100%;border-collapse:collapse;font-size:16px;}

  th{color:var(--accent2);font-size:12.5px;letter-spacing:.05em;text-transform:uppercase;}
  td.mono{font-family:ui-monospace,Consolas,monospace;font-size:13.5px;color:#bfe6ff;}
  .why{background:rgba(70,224,200,.06);border:1px solid #1f6b5e;border-radius:12px;padding:12px 16px;margin:.5em 0;}
  .why h3{color:var(--accent2);}
  .note{background:rgba(255,206,107,.07);border:1px solid #7d6630;border-radius:12px;padding:12px 16px;}
  .note h3{color:var(--warn);}
  .ok{color:var(--ok);font-weight:700;}
  code{font-family:ui-monospace,Consolas,monospace;background:#0e152e;border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-size:.9em;color:#bfe6ff;}
  .cmd{display:block;font-family:ui-monospace,Consolas,monospace;font-size:14px;background:#0e152e;border:1px solid var(--line);border-radius:10px;padding:10px 14px;color:#bfe6ff;margin:8px 0;white-space:pre-wrap;}
  .step{display:flex;gap:12px;align-items:flex-start;margin:10px 0;}
  .num{flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:var(--accent);color:#1a1330;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;}
  .author{margin-top:24px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .badge{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:12px;padding:9px 14px;font-size:15px;}
  .chrome{position:fixed;left:0;right:0;bottom:0;height:58px;display:flex;align-items:center;gap:14px;padding:0 22px;
    background:linear-gradient(0deg,rgba(8,12,26,.96),rgba(8,12,26,.55));border-top:1px solid var(--line);backdrop-filter:blur(6px);z-index:20;}

  .nbtn:hover{background:#2f3c75;}.nbtn:disabled{opacity:.4;cursor:default;}
  .counter{font-variant-numeric:tabular-nums;font-weight:700;color:#cdd8ff;font-size:14px;min-width:60px;text-align:center;}
  .hint{font-size:12px;color:#6f7caf;}
  .deck-title{font-size:13px;color:var(--muted);margin-left:auto;}
  @media (max-width:820px){.deck{padding:18px 16px 76px;}h1{font-size:34px;}h2{font-size:26px;}.g2,.g3{grid-template-columns:1fr;}}
</style>
</head>

const deck=document.getElementById("deck");
deck.innerHTML=slides.join("");
const els=Array.from(deck.querySelectorAll(".slide"));
const N=els.length;let cur=0;
const counter=document.getElementById("counter"),progress=document.getElementById("progress");
const prevB=document.getElementById("prev"),nextB=document.getElementById("next");
function show(i){
  cur=Math.max(0,Math.min(N-1,i));
  els.forEach((s,k)=>s.classList.toggle("active",k===cur));
  counter.textContent=(cur+1)+" / "+N;
  progress.style.width=((cur+1)/N*100)+"%";
  prevB.disabled=cur===0;nextB.disabled=cur===N-1;
  const a=els[cur];if(a)a.scrollTop=0;
  try{location.hash="s"+(cur+1);}catch(e){}
}
prevB.onclick=()=>show(cur-1);nextB.onclick=()=>show(cur+1);
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" "||e.key==="PageDown"){e.preventDefault();show(cur+1);}
  else if(e.key==="ArrowLeft"||e.key==="PageUp"){e.preventDefault();show(cur-1);}
  else if(e.key==="Home"){e.preventDefault();show(0);}
  else if(e.key==="End"){e.preventDefault();show(N-1);}
});
(function(){const m=/^#s(\d+)$/.exec(location.hash);show(m?parseInt(m[1],10)-1:0);})();
</script>
</body>
</html>

<style>
  :root{
    --bg:#0b1020; --bg2:#121a33; --panel:#161f3d; --panel2:#1b2647;
    --ink:#e8edff; --muted:#9aa6c9; --line:#2a3766;
    --accent:#8b6cff; --accent2:#46e0c8; --accent3:#5aa6ff;
    --code-bg:#0a0f22; --ok:#46e0c8; --warn:#ffce6b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 800px at 15% -10%,#1c2550 0%,transparent 55%),
               radial-gradient(1000px 700px at 110% 10%,#27325f 0%,transparent 50%),
               var(--bg);
    color:var(--ink); overflow:hidden;
  }
  .deck{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:48px 56px 84px;}
  .slide{
    display:none; width:100%; max-width:1180px; max-height:100%;
    overflow:auto; animation:fade .35s ease;
  }
  .slide.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .slide::-webkit-scrollbar{width:9px;height:9px;}
  .slide::-webkit-scrollbar-thumb{background:#33406f;border-radius:6px;}

  .eyebrow{display:inline-block;font-size:13px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--accent2);font-weight:700;margin-bottom:14px;
    border:1px solid var(--line);padding:5px 12px;border-radius:999px;background:rgba(70,224,200,.06);}
  h1{font-size:48px;line-height:1.08;margin:.1em 0 .25em;font-weight:800;letter-spacing:-.02em;
    background:linear-gradient(90deg,#fff,#bcd0ff 55%,#8b6cff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  h2{font-size:34px;line-height:1.12;margin:0 0 .4em;font-weight:800;letter-spacing:-.01em;}
  h3{font-size:20px;margin:0 0 .3em;font-weight:700;color:#dbe4ff;}
  p{font-size:18px;line-height:1.55;color:#d4dcf6;margin:.4em 0;}
  .lead{font-size:21px;color:var(--muted);}
  ul{margin:.3em 0;padding-left:1.2em;}
  li{font-size:17.5px;line-height:1.5;margin:.42em 0;color:#d4dcf6;}
  li::marker{color:var(--accent);}
  strong{color:#fff;}
  .muted{color:var(--muted);}

  .grid{display:grid;gap:18px;}
  .g2{grid-template-columns:1fr 1fr;}
  .g3{grid-template-columns:repeat(3,1fr);}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
    border-radius:16px;padding:20px 22px;}
  .card.tight{padding:16px 18px;}
  .pill{display:inline-block;font-size:12.5px;font-weight:700;padding:3px 10px;border-radius:999px;
    background:rgba(139,108,255,.16);color:#c8bcff;border:1px solid #463a85;}
  .pill.env{background:rgba(90,166,255,.14);color:#aac8ff;border-color:#2f4a7d;}
  .pill.fb{background:rgba(70,224,200,.14);color:#9af0e0;border-color:#1f6b5e;}
  .pill.state{background:rgba(255,206,107,.14);color:#ffe0a3;border-color:#7d6630;}
  .pill.life{background:rgba(255,140,180,.14);color:#ffc0d4;border-color:#7d3a55;}
  .pill.guide{background:rgba(139,108,255,.16);color:#c8bcff;border-color:#463a85;}

  /* code block */
  .codewrap{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--code-bg);margin:.6em 0;}
  .codehead{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:#0e152e;border-bottom:1px solid var(--line);padding:8px 12px;}
  .codepath{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;color:#9fb2e8;
    display:flex;align-items:center;gap:8px;}
  .dot{width:11px;height:11px;border-radius:50%;background:#ff5f57;box-shadow:18px 0 #febc2e,36px 0 #28c840;margin-right:34px;}
  .copybtn{font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;color:#dfe7ff;
    background:#27326a;border:1px solid #3a478a;border-radius:8px;padding:5px 12px;}
  .copybtn:hover{background:#34419a;}
  .copybtn.ok{background:#1f6b5e;border-color:#2da38c;color:#d6fff5;}
  pre{margin:0;padding:14px 16px;max-height:48vh;overflow:auto;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.7px;line-height:1.55;color:#d7e0ff;}
  pre::-webkit-scrollbar{width:10px;height:10px;}
  pre::-webkit-scrollbar-thumb{background:#2c386b;border-radius:6px;}
  pre.sm{font-size:12px;max-height:40vh;}
  .cmd{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13.5px;background:#0e152e;
    border:1px solid var(--line);border-radius:8px;padding:8px 12px;color:#bfe6ff;display:inline-block;}
  code.inl{font-family:ui-monospace,Menlo,Consolas,monospace;background:#0e152e;border:1px solid var(--line);
    border-radius:6px;padding:1px 6px;font-size:.92em;color:#bfe6ff;}

  /* title slide */
  .title-slide{text-align:left;}
  .title-slide h1{font-size:58px;}
  .author{margin-top:26px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;}
  .badge{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:12px;padding:10px 16px;font-size:15px;}

  /* layered rings (evolution) */
  .rings{position:relative;width:420px;height:300px;margin:6px auto;}
  .ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:18px;
    display:flex;align-items:flex-start;justify-content:center;padding-top:12px;font-weight:700;}
  .r1{width:420px;height:300px;background:rgba(139,108,255,.10);border:1.5px solid #4a3e92;color:#c9bcff;}
  .r2{width:330px;height:230px;background:rgba(90,166,255,.10);border:1.5px solid #345385;color:#aac8ff;}
  .r3{width:240px;height:160px;background:rgba(70,224,200,.10);border:1.5px solid #1f6b5e;color:#9af0e0;}
  .r4{width:150px;height:92px;background:rgba(255,206,107,.14);border:1.5px solid #7d6630;color:#ffe0a3;
    align-items:center;padding-top:0;}
  .ring span{font-size:13.5px;}

  /* subsystem table */
  table{width:100%;border-collapse:collapse;font-size:16px;}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top;}
  th{color:var(--accent2);font-size:13px;letter-spacing:.05em;text-transform:uppercase;}
  td.art{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13.5px;color:#bfe6ff;}

  /* bars (ablation) */
  .bars{display:flex;flex-direction:column;gap:14px;margin-top:8px;}
  .bar-row{display:grid;grid-template-columns:230px 1fr 56px;align-items:center;gap:14px;}
  .bar-label{font-size:15px;color:#d4dcf6;}
  .bar-track{background:#0e152e;border:1px solid var(--line);border-radius:10px;height:26px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:9px 0 0 9px;background:linear-gradient(90deg,#5aa6ff,#8b6cff,#46e0c8);
    display:flex;align-items:center;}
  .bar-pct{font-weight:800;font-size:16px;text-align:right;color:#bcd0ff;}

  /* dag */
  .dag{display:flex;flex-wrap:wrap;gap:10px;align-items:center;font-family:ui-monospace,Menlo,monospace;font-size:13px;}
  .node{background:#1a2348;border:1px solid #39477f;border-radius:9px;padding:7px 11px;color:#cfe;}
  .node.done{background:#143f37;border-color:#2da38c;color:#bff5e8;}
  .arrow{color:#6c7bb5;}

  /* steps */
  .step{border-left:3px solid var(--accent);padding:6px 0 6px 16px;margin:10px 0;}
  .stepnum{display:inline-flex;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#1a1330;
    align-items:center;justify-content:center;font-weight:800;font-size:13px;margin-right:8px;}

  .evi-out{background:var(--code-bg);border:1px solid var(--line);border-radius:10px;
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.6px;line-height:1.5;color:#c9ffe9;
    padding:10px 12px;white-space:pre-wrap;max-height:30vh;overflow:auto;}

  /* footer / nav */
  .chrome{position:fixed;left:0;right:0;bottom:0;height:60px;display:flex;align-items:center;
    gap:14px;padding:0 24px;background:linear-gradient(0deg,rgba(8,12,26,.96),rgba(8,12,26,.55));
    border-top:1px solid var(--line);backdrop-filter:blur(6px);z-index:20;}
  .progress{position:fixed;left:0;top:0;height:4px;background:linear-gradient(90deg,#5aa6ff,#8b6cff,#46e0c8);
    z-index:30;transition:width .3s ease;width:0;}
  .nbtn{font:inherit;font-weight:700;font-size:14px;cursor:pointer;color:#e8edff;background:#222d59;
    border:1px solid #38468a;border-radius:9px;padding:8px 14px;}
  .nbtn:hover{background:#2f3c75;}
  .nbtn:disabled{opacity:.4;cursor:default;}
  .counter{font-variant-numeric:tabular-nums;font-weight:700;color:#cdd8ff;font-size:14px;min-width:64px;text-align:center;}
  .deck-title{font-size:13px;color:var(--muted);margin-left:auto;letter-spacing:.04em;}
  .hint{font-size:12px;color:#6f7caf;}
  .tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .why{background:rgba(70,224,200,.06);border:1px solid #1f6b5e;border-radius:12px;padding:12px 16px;margin:.5em 0;}
  .why h3{color:var(--accent2);}
  .note{background:rgba(255,206,107,.07);border:1px solid #7d6630;border-radius:12px;padding:12px 16px;}

  .tree{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;line-height:1.6;color:#cfe;
    background:var(--code-bg);border:1px solid var(--line);border-radius:12px;padding:16px 18px;white-space:pre;overflow:auto;}
  @media (max-width:820px){
    .deck{padding:20px 18px 78px;}
    h1{font-size:34px;}.title-slide h1{font-size:38px;}h2{font-size:26px;}
    .g2,.g3{grid-template-columns:1fr;}
    .bar-row{grid-template-columns:130px 1fr 44px;}
    .rings{transform:scale(.8);}

<script>
/* ---------- helpers ---------- */
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
let copyId = 0;
function codeBlock(path, content){
  const id = "code-"+(copyId++);
  return `<div class="codewrap">
    <div class="codehead">
      <span class="codepath"><span class="dot"></span>${esc(path)}</span>
      <button class="copybtn" data-target="${id}">Copy</button>
    </div>
    <pre id="${id}"><code>${esc(content)}</code></pre>
  </div>`;
}

/* ---------- harness file contents ---------- */
const F = {};
F["init.sh"] = `#!/usr/bin/env bash
# init.sh — Phản hồi (Feedback) + Môi trường: cài đặt & verify toàn bộ từ checkout sạch.
# Phải khớp 100% với scripts trong package.json gốc.
set -euo pipefail

ROOT_DIR="$(cd "$(dirname "\${BASH_SOURCE[0]}")" && pwd)"
cd "$ROOT_DIR"

bold() { printf '\\033[1m%s\\033[0m\\n' "$1"; }
step() { printf '\\n\\033[1;34m==> %s\\033[0m\\n' "$1"; }

# ---------------------------------------------------------------------------
step "1/9 Kiểm tra Node 20"
if ! command -v node >/dev/null 2>&1; then
  echo "Lỗi: chưa có Node. Cài Node 20 (xem .nvmrc) rồi chạy lại." >&2
  exit 1
fi
NODE_MAJOR="$(node -p 'process.versions.node.split(".")[0]')"
if [ "$NODE_MAJOR" != "20" ]; then
  echo "Lỗi: cần Node 20 (đang dùng $(node -v)). Chạy: nvm use" >&2
  exit 1
fi
echo "Node $(node -v) OK"

# ---------------------------------------------------------------------------
step "2/9 Chuẩn bị .env"
if [ ! -f .env ]; then
  cp .env.example .env
  echo "Đã tạo .env từ .env.example"
else
  echo ".env đã tồn tại — giữ nguyên"
fi

# Nạp .env vào môi trường để các bước sau dùng đúng cấu hình thật
# (DB_HOST/DB_PORT/DB_USER/DB_PASS/DB_NAME) — khớp AGENTS.md/ARCHITECTURE.md.
set -a
# shellcheck disable=SC1091
. ./.env
set +a

# ---------------------------------------------------------------------------
step "3/9 npm install (workspaces)"
npm install

# ---------------------------------------------------------------------------
step "4/9 npm run db:up (MySQL 8 qua docker-compose)"
npm run db:up

# ---------------------------------------------------------------------------
step "5/9 Chờ MySQL healthy"
# Probe khớp healthcheck trong docker-compose.yml (dùng -u hr -phr_pass),
# KHÔNG dùng root mặc định (sẽ Access denied vì MYSQL_ROOT_PASSWORD=hr_root_pass).
DB_HOST="\${DB_HOST:-127.0.0.1}"
DB_PORT="\${DB_PORT:-3306}"
DB_USER="\${DB_USER:-hr}"
DB_PASS="\${DB_PASS:-hr_pass}"
ATTEMPTS=60
until docker compose exec -T db \\
        mysqladmin ping -h 127.0.0.1 -u"$DB_USER" -p"$DB_PASS" --silent >/dev/null 2>&1; do
  ATTEMPTS=$((ATTEMPTS - 1))
  if [ "$ATTEMPTS" -le 0 ]; then
    echo "Lỗi: MySQL không healthy sau khi chờ. Xem: docker compose logs db" >&2
    exit 1
  fi
  printf '.'
  sleep 2
done
echo ""
echo "MySQL healthy (db=\${DB_NAME:-hr}, host=\${DB_HOST}, port=\${DB_PORT}, user=\${DB_USER})"

# ---------------------------------------------------------------------------
step "6/9 npm run migration:run (TypeORM)"
npm run migration:run

# ---------------------------------------------------------------------------
step "7/9 npm run check (typecheck api + web)"
npm run check

step "8/9 npm run lint && npm run test (jest + vitest)"
npm run lint
npm run test

step "9/9 npm run build (api + web)"
npm run build

# ---------------------------------------------------------------------------
bold ""
bold "================ HARNESS XANH ================"
cat <<'EOF'

Môi trường đã sẵn sàng và clean state.

Bước tiếp theo:
  1. Mở .claude/feature_list.json — chọn ĐÚNG 1 feature status "not-started"
     mà mọi dependency đã "done" (bắt đầu: feat-001).
  2. Đặt feature đó sang "in-progress".
  3. Làm feature. Sau mỗi thay đổi đáng kể, chạy lại lệnh verify liên quan:
       npm run check && npm run lint && npm run test && npm run build
  4. Khi xong: chạy lại \`bash init.sh\`, dán output vào trường "evidence".
  5. Cập nhật feature_list.json (done), progress.md, session-handoff.md.

Dev song song:  npm run dev
EOF`;

F["package.json"] = `{
  "name": "quan-ly-nhan-su",
  "private": true,
  "version": "0.1.0",
  "description": "Trang quản lý nhân viên — monorepo npm workspaces (NestJS + React).",
  "engines": {
    "node": ">=20 <21"
  },
  "workspaces": [
    "apps/*"
  ],
  "scripts": {
    "dev": "concurrently -k -n api,web -c blue,green \\"npm:dev --workspace=apps/api\\" \\"npm:dev --workspace=apps/web\\"",
    "check": "npm run check --workspace=apps/api && npm run check --workspace=apps/web",
    "lint": "npm run lint --workspace=apps/api && npm run lint --workspace=apps/web",
    "test": "npm run test --workspace=apps/api && npm run test --workspace=apps/web",
    "build": "npm run build --workspace=apps/api && npm run build --workspace=apps/web",
    "db:up": "docker compose up -d db",
    "db:down": "docker compose down",
    "migration:run": "npm run migration:run --workspace=apps/api"
  },
  "devDependencies": {
    "concurrently": "^9.1.0"
  }
}`;

F["docker-compose.yml"] = `services:
  db:
    image: mysql:8.0
    container_name: qlns-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hr
      MYSQL_USER: hr
      MYSQL_PASSWORD: hr_pass
      MYSQL_ROOT_PASSWORD: hr_root_pass
    ports:
      # Cổng host có thể override qua DB_PORT trong .env (vd 3307) nếu 3306 bị chiếm.
      # Cổng trong container luôn là 3306.
      - "\${DB_PORT:-3306}:3306"
    volumes:
      - qlns_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "hr", "-phr_pass"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  qlns_mysql_data:`;

F[".nvmrc"] = `20`;

F[".env.example"] = `# Sao chép thành .env (KHÔNG commit .env). Giá trị khớp docker-compose.yml.
# --- Database (TypeORM DataSource đọc các biến này; init.sh nạp .env trước khi chờ DB) ---

DB_PORT=3306
DB_USER=hr
DB_PASS=hr_pass
DB_NAME=hr

# --- Auth ---
JWT_SECRET=doi_chuoi_bi_mat_nay_trong_moi_truong_that`;

F["progress.md"] = `# Progress — Quản lý nhân viên

> Nhật ký phiên. Cập nhật cuối mỗi phiên. Nguồn sự thật về scope là \`.claude/feature_list.json\`; file này là dòng thời gian con người đọc.

- DB không healthy: kiểm tra \`docker compose ps\`, log \`docker compose logs db\`, đối chiếu \`.env\` với \`docker-compose.yml\`. Probe trong \`init.sh\` dùng đúng \`-u"$DB_USER" -p"$DB_PASS"\` (mặc định \`hr\`/\`hr_pass\`), khớp healthcheck — KHÔNG dùng root mặc định (sẽ Access denied).
- **Xung đột cổng 3306**: nếu máy dev đã chạy MySQL cục bộ chiếm 3306, \`npm run db:up\` sẽ lỗi bind cổng. Khắc phục: đặt \`DB_PORT=3307\` (hoặc cổng trống khác) trong \`.env\`; \`docker-compose.yml\` map \`"\${DB_PORT:-3306}:3306"\` và TypeORM cũng đọc \`DB_PORT\` từ \`.env\` — toàn bộ pipeline đồng bộ theo một biến.

## Mục tiêu
Cho phép admin của công ty quản lý danh sách nhân viên theo phòng ban: xem, thêm, sửa, xóa. Truy cập ghi cần đăng nhập admin.

## Người dùng
- **Admin**: đăng nhập, toàn quyền CRUD nhân viên & phòng ban.
- **Khách nội bộ (xem)**: có thể xem danh sách (route đọc không bắt buộc JWT trong phạm vi học tập).

## Use case chính
1. **Đăng nhập admin** — nhập tài khoản → nhận JWT → mở khóa thao tác ghi.
2. **Xem danh sách nhân viên** — bảng hiển thị họ tên, email, chức vụ, phòng ban, ngày vào làm, lương.
3. **Thêm nhân viên** — form nhập đủ trường, validate, lưu, hiển thị lại trong danh sách.
4. **Sửa nhân viên** — mở form điền sẵn, cập nhật, lưu.
5. **Xóa nhân viên** — xác nhận rồi xóa khỏi danh sách.
6. **Gán phòng ban** — mỗi nhân viên thuộc đúng một phòng ban (chọn từ danh sách phòng ban).

## Trường dữ liệu nhân viên (NhanVien)
| Trường | Kiểu | Ràng buộc |
|---|---|---|
| \`ho_ten\` | string | bắt buộc, không rỗng |
| \`email\` | string | bắt buộc, định dạng email, **unique** |
| \`chuc_vu\` | string | bắt buộc (ví dụ: Nhân viên, Trưởng nhóm) |
| \`phong_ban\` | quan hệ → PhongBan | bắt buộc, ManyToOne (lưu \`phong_ban_id\`) |
| \`ngay_vao_lam\` | date | bắt buộc, không ở tương lai |
| \`luong\` | decimal | bắt buộc, > 0 |

## Trường dữ liệu phòng ban (PhongBan)
| Trường | Kiểu | Ràng buộc |
|---|---|---|
| \`ten\` | string | bắt buộc, unique (ví dụ: Kế toán, Kỹ thuật) |

## Quy tắc nghiệp vụ
- Email nhân viên là duy nhất toàn hệ thống.
- Không xóa phòng ban nếu còn nhân viên trực thuộc (kiểm tra ở service).
- Lương lưu dạng decimal, hiển thị định dạng tiền tệ VND ở frontend.

Đăng nhập admin → tạo nhân viên qua form → nhân viên xuất hiện trong danh sách với đúng phòng ban. Có bằng chứng (log/ảnh/test pass).`;

  return `<span class="pill ${m[s]||'guide'}">Hệ thống: ${s}</span>`;
}
function practiceFile(opts){
  return `<div class="tag-row">${subBadge(opts.sub)}<span class="pill">${opts.path}</span></div>
    <div class="why"><h3>Vì sao cần</h3><p style="margin:.2em 0">${opts.why}</p></div>

    <p class="muted" style="font-size:14.5px;margin-top:8px">▶ Lệnh đặt file:</p>
    <span class="cmd">${esc(opts.cmd)}</span>`;
}

/* ---------- render & engine ---------- */
const deck = document.getElementById("deck");
deck.innerHTML = slides.join("");
const slideEls = Array.from(deck.querySelectorAll(".slide"));
const N = slideEls.length;
let cur = 0;

const counter = document.getElementById("counter");
const progress = document.getElementById("progress");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

function show(i){
  cur = Math.max(0, Math.min(N-1, i));
  slideEls.forEach((s,k)=>s.classList.toggle("active",k===cur));
  counter.textContent = (cur+1)+" / "+N;
  progress.style.width = ((cur+1)/N*100)+"%";
  prevBtn.disabled = cur===0;
  nextBtn.disabled = cur===N-1;
  const a = slideEls[cur]; if(a) a.scrollTop = 0;
  try{ location.hash = "s"+(cur+1); }catch(e){}
}
function nextS(){ show(cur+1); }
function prevS(){ show(cur-1); }

prevBtn.addEventListener("click",prevS);
nextBtn.addEventListener("click",nextS);

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" "||e.key==="PageDown"){ e.preventDefault(); nextS(); }
  else if(e.key==="ArrowLeft"||e.key==="PageUp"){ e.preventDefault(); prevS(); }
  else if(e.key==="Home"){ e.preventDefault(); show(0); }
  else if(e.key==="End"){ e.preventDefault(); show(N-1); }
});

/* copy buttons (event delegation, with fallback) */
deck.addEventListener("click",e=>{
  const btn = e.target.closest(".copybtn");
  if(!btn) return;
  const pre = document.getElementById(btn.dataset.target);
  if(!pre) return;
  const text = pre.innerText;
  const done = ()=>{ const o=btn.textContent; btn.textContent="✓ Đã copy"; btn.classList.add("ok");
    setTimeout(()=>{ btn.textContent=o; btn.classList.remove("ok"); },1400); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else fallback(text,done);
});
function fallback(text,done){
  try{
    const ta=document.createElement("textarea");
    ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; ta.style.top="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta); done();
  }catch(err){ /* noop */ }
}

/* deep-link via hash */
(function(){
  const m = /^#s(\d+)$/.exec(location.hash);
  show(m ? parseInt(m[1],10)-1 : 0);
})();
</script>
